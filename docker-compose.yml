version: '3.8'

services:
  # 1. THE VAULT (Bộ nhớ Redis) -> Đã chuyển sang chế độ Tàng hình tuyệt đối
  vault_memory:
    image: redis:alpine
    # Đã khôi phục mục ports cho Phantom Scraper chạy ở mức host.
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - alien_network

  # [MỚI] 1.5 KÉT SẮT DỮ LIỆU (PostgreSQL)
  db_vault:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alien_admin
      POSTGRES_PASSWORD: The_Absolute_Password_2026
      POSTGRES_DB: tech_oracle_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./_code/infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - alien_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alien_admin -d tech_oracle_db"]
      interval: 10s
      timeout: 10s
      retries: 10      # Tăng lên 10 lần thử (100 giây)

  # 2. THE CORE (Trái tim Điều phối & Playwright Scraper)
  core_api:
    build: ./_code/core-backend
    restart: unless-stopped
    ports:
      - "8888:8888" # Đưa về Chuẩn Lõi 8888
    env_file:
      - ./_code/core-backend/.env
    environment:
      - DATABASE_URL=postgresql://alien_admin:The_Absolute_Password_2026@db_vault:5432/tech_oracle_db
    volumes:
      - vault_sqlite:/app/offline_vault.db   # Bảo toàn SQLite qua restart
    depends_on:
      vault_memory:
        condition: service_healthy
      db_vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/health"]
      interval: 10s
      timeout: 15s     # Cho phép API phản hồi chậm hơn
      retries: 15      # Tăng lên 15 lần thử (150 giây) để đợi Chromium & AI load xong
    networks:
      - alien_network

  # 3. THE NEXUS (Giao diện 3D SvelteKit)
  nexus_ui:
    build: ./_code/nexus-frontend
    restart: unless-stopped
    ports:
      - "3333:3000" # Mở cổng 3333 cho bên ngoài, ánh xạ vào cổng 3000 của Vite bên trong
    # TẠM THỜI TẮT ĐIỀU KIỆN ĐỢI BACKEND ĐỂ FRONTEND ĐƯỢC PHÉP CHẠY TRƯỚC
    # depends_on:
    #   core_api:
    #     condition: service_healthy
    environment:
      - VITE_CORE_API_URL=http://localhost:8888
    networks:
      - alien_network

  # [MỚI] 4. BỘ TỔNG THAM MƯU (Admin Dashboard React-Admin)
  admin_ui:
    build: ./_code/admin-dashboard
    ports:
      - "4444:4444"
    environment:
      - VITE_CORE_API_URL=http://localhost:8888
    depends_on:
      - core_api
    networks:
      - alien_network

  # [MỚI] 5. LÕI TRÍ NHỚ SÂU (Claude-Mem MCP Server)
  memory_server:
    build: ./_code/claude-memory
    ports:
      - "37777:37777" # Default UI port for claude-mem
    volumes:
      - claude_mem_data:/root/.claude-mem
    networks:
      - alien_network

# Khai báo Volume vật lý để dữ liệu không bị mất khi xóa Container
volumes:
  pg_data:
  claude_mem_data:
  vault_sqlite:   # Két Sắt SQLite — offline_vault.db tồn tại vĩnh cửu

# Kén bảo vệ sinh học: Cô lập hệ thống khỏi rác của Windows Host
networks:
  alien_network:
    driver: bridge
